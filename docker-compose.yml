services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: quizforge
      POSTGRES_PASSWORD: quizforge
      POSTGRES_DB: quizforge
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - quizforge-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - quizforge-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    networks:
      - quizforge-net

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A celery_worker worker --loglevel=info
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
      - redis
    networks:
      - quizforge-net

volumes:
  pgdata:

networks:
  quizforge-net:
    driver: bridge
