<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>QuizForge · 智能题库</title>
<style>
  :root {
    --paper: #F4F5F7;
    --card: #FFFFFF;
    --ink: #1A1C22;
    --muted: #6B7280;
    --line: #E3E5EA;
    --accent: #2F4BFF;
    --accent-soft: #E9ECFF;
    --correct: #1E9E6A;
    --correct-soft: #E4F4ED;
    --wrong: #E5484D;
    --wrong-soft: #FBE9EA;
    --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    --sans: "Inter", system-ui, -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  }
  * { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    margin: 0; font-family: var(--sans); color: var(--ink);
    background: var(--paper); line-height: 1.5;
    font-feature-settings: "tnum" 1;
  }
  button { font-family: inherit; cursor: pointer; }
  input, select, textarea { font-family: inherit; font-size: 14px; }
  a { color: var(--accent); }

  /* ---------- shell ---------- */
  .app { display: grid; grid-template-columns: 220px 1fr; min-height: 100vh; }
  .rail {
    background: var(--ink); color: #C7CAD1; padding: 22px 16px;
    display: flex; flex-direction: column; gap: 4px; position: sticky; top: 0; height: 100vh;
  }
  .brand { display: flex; align-items: center; gap: 11px; padding: 4px 8px 22px; }
  .brand .mark {
    width: 34px; height: 34px; border-radius: 9px; background: var(--accent);
    display: grid; place-items: center; color: #fff; font-weight: 800; font-size: 17px;
    box-shadow: 0 0 0 4px rgba(47,75,255,.18);
  }
  .brand b { color: var(--ink); font-size: 17px; letter-spacing: .2px; }
  .rail .brand b { color: #fff; }
  .brand span { display: block; font-size: 11px; color: #7E8390; font-family: var(--mono); letter-spacing: 1px; }
  .nav { display: flex; align-items: center; gap: 11px; padding: 10px 12px; border-radius: 9px;
    color: #C7CAD1; font-size: 14px; font-weight: 500; border: none; background: none; width: 100%; text-align: left; }
  .nav .ic { width: 18px; text-align: center; opacity: .85; }
  .nav:hover { background: rgba(255,255,255,.06); color: #fff; }
  .nav.on { background: var(--accent); color: #fff; }
  .nav-section { font-size: 10px; font-weight: 700; color: #4A4E5A; letter-spacing: .8px;
    text-transform: uppercase; padding: 16px 12px 6px; }
  .nav-divider { height: 1px; background: rgba(255,255,255,.06); margin: 8px 0; }
  .rail .spacer { flex: 1; }
  .userbar { display: flex; align-items: center; gap: 10px; padding: 12px 8px; border-top: 1px solid rgba(255,255,255,.08); }
  .avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--accent); display: grid;
    place-items: center; font-size: 13px; font-weight: 700; color: #fff; flex: none; }
  .userinfo { flex: 1; min-width: 0; }
  .userinfo .uname { font-size: 13px; font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .userinfo .urole { font-size: 11px; color: #7E8390; margin-top: 1px; }
  .signout { flex: none; background: none; border: 1px solid rgba(255,255,255,.15); color: #9398A4;
    padding: 5px 8px; border-radius: 7px; font-size: 12px; cursor: pointer; }
  .signout:hover { color: #fff; border-color: rgba(255,255,255,.4); }

  .main { padding: 32px 44px 80px; max-width: 1120px; }
  .head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 22px; }
  .head h1 { font-size: 22px; margin: 0; letter-spacing: -.3px; font-weight: 600; }
  .head .sub { color: var(--muted); font-size: 13px; font-family: var(--mono); }

  /* ---------- pieces ---------- */
  .card { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 20px; }
  .grid { display: grid; gap: 14px; }
  .cols { grid-template-columns: repeat(auto-fill, minmax(248px, 1fr)); }
  .btn { background: var(--accent); color: #fff; border: none; padding: 10px 16px; border-radius: 9px;
    font-weight: 600; font-size: 14px; }
  .btn:hover { filter: brightness(1.07); }
  .btn:disabled { opacity: .5; cursor: not-allowed; filter: none; }
  .btn.ghost { background: var(--card); color: var(--ink); border: 1px solid var(--line); }
  .btn.ghost:hover { border-color: var(--ink); filter: none; }
  .btn.sm { padding: 7px 12px; font-size: 13px; }
  .topic-tag { font-size:12px; padding:4px 11px; border-radius:999px; border:1.5px solid var(--line);
    background:var(--card); color:var(--muted); cursor:pointer; transition:all .12s; white-space:nowrap; }
  .topic-tag:hover { border-color:#b0b4be; color:var(--ink); }
  .topic-tag.on { background: var(--accent-soft); color: var(--accent); border-color: var(--accent); font-weight:600; }
  label.f { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin: 0 0 6px; letter-spacing: .2px; }
  .in { width: 100%; padding: 10px 12px; border: 1px solid var(--line); border-radius: 9px; background: #fff; color: var(--ink); }
  .in:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .row { display: flex; gap: 12px; flex-wrap: wrap; }
  .row > * { flex: 1; min-width: 120px; }
  .pill { font-family: var(--mono); font-size: 11px; padding: 3px 9px; border-radius: 999px; background: var(--paper);
    border: 1px solid var(--line); color: var(--muted); letter-spacing: .3px; }
  .pill.ok { background: var(--correct-soft); color: var(--correct); border-color: transparent; }
  .pill.warn { background: #FFF3E0; color: #B26A00; border-color: transparent; }
  .muted { color: var(--muted); }
  .empty { text-align: center; padding: 50px 20px; color: var(--muted); }
  .empty .big { font-size: 30px; margin-bottom: 10px; opacity: .5; }
  .toast { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%);
    background: var(--ink); color: #fff; padding: 11px 18px; border-radius: 10px; font-size: 14px;
    box-shadow: 0 8px 30px rgba(0,0,0,.2); opacity: 0; pointer-events: none; transition: opacity .2s, transform .2s; z-index: 50; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(-4px); }
  .toast.err { background: var(--wrong); }

  /* ---------- bank card ---------- */
  .bank { cursor: pointer; transition: transform .12s, box-shadow .12s; display: flex; flex-direction: column; }
  .bank:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(26,28,34,.08); border-color: #cfd3da; }
  .bank-industry { display: inline-flex; align-items: center; gap: 4px; font-size: 11px;
    padding: 2px 8px; border-radius: 5px; font-weight: 500; margin-bottom: 10px; }
  .bank-count-big { font-family: var(--mono); font-size: 28px; font-weight: 800;
    letter-spacing: -1px; color: var(--ink); line-height: 1; }
  .bank-count-big small { font-size: 13px; font-weight: 400; color: var(--muted); margin-left: 4px; }
  .bank h3 { margin: 0 0 6px; font-size: 16px; }
  .bank .desc { font-size: 13px; color: var(--muted); min-height: 20px; margin-bottom: 14px; }
  .bank .meta { display: flex; align-items: center; gap: 8px; }
  .count { font-family: var(--mono); font-size: 22px; font-weight: 700; }
  .count small { font-size: 11px; color: var(--muted); font-weight: 400; margin-left: 3px; }

  /* ---------- 答题卡 / OMR signature ---------- */
  .sheet { max-width: 640px; }
  .qmeta { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .qmeta .n { font-family: var(--mono); font-size: 13px; color: var(--muted); letter-spacing: 1px; }
  .progress { height: 6px; background: var(--line); border-radius: 99px; overflow: hidden; margin-bottom: 22px; }
  .progress i { display: block; height: 100%; background: var(--accent); border-radius: 99px; transition: width .6s ease-out; }
  .stem { font-size: 18px; line-height: 1.55; margin: 0 0 22px; font-weight: 500; }
  .opt { display: flex; align-items: center; gap: 14px; padding: 13px 15px; border: 1.5px solid var(--line);
    border-radius: 11px; margin-bottom: 10px; background: #fff; cursor: pointer; transition: border-color .12s, background .12s; }
  .opt:hover { border-color: #b9bdc6; }
  .opt .bubble {
    flex: none; width: 30px; height: 30px; border-radius: 50%; border: 2px solid #C2C6CE;
    display: grid; place-items: center; font-family: var(--mono); font-weight: 700; font-size: 14px; color: var(--muted);
    transition: all .12s;
  }
  .opt .txt { font-size: 15px; }
  .opt.pick { border-color: var(--accent); background: var(--accent-soft); }
  .opt.pick .bubble { background: var(--ink); border-color: var(--ink); color: #fff; }
  .opt.correct { border-color: var(--correct); background: var(--correct-soft); }
  .opt.correct .bubble { background: var(--correct); border-color: var(--correct); color: #fff; }
  .opt.bad { border-color: var(--wrong); background: var(--wrong-soft); }
  .opt.bad .bubble { background: var(--wrong); border-color: var(--wrong); color: #fff; }
  .opt.locked { cursor: default; }
  .explain { margin-top: 6px; padding: 14px 16px; border-radius: 11px; background: var(--paper);
    border-left: 3px solid var(--accent); font-size: 14px; color: #353841; }
  .explain.r { border-left-color: var(--correct); }
  .explain.w { border-left-color: var(--wrong); }

  /* ---------- stats ---------- */
  .stat { padding: 18px 20px; }
  .stat .v { font-family: var(--mono); font-size: 30px; font-weight: 700; letter-spacing: -1px; }
  .stat .k { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .bar { height: 8px; background: var(--line); border-radius: 99px; overflow: hidden; margin-top: 6px; }
  .bar i { display: block; height: 100%; background: var(--accent); }

  /* ---------- auth ---------- */
  .auth { min-height: 100vh; display: grid; place-items: center; padding: 24px;
    background: radial-gradient(120% 90% at 50% -10%, #fff 0%, var(--paper) 60%); }
  .authcard { width: 100%; max-width: 380px; }
  .authcard .brand { justify-content: center; padding-bottom: 26px; }
  .tabs { display: flex; background: var(--paper); border-radius: 10px; padding: 4px; margin-bottom: 18px; }
  .tabs button { flex: 1; border: none; background: none; padding: 9px; border-radius: 7px; font-weight: 600; font-size: 14px; color: var(--muted); }
  .tabs button.on { background: #fff; color: var(--ink); box-shadow: 0 1px 4px rgba(0,0,0,.08); }
  .fld { margin-bottom: 14px; }

  @media (max-width: 760px) {
    .app { grid-template-columns: 1fr; }
    .rail { position: static; height: auto; flex-direction: row; flex-wrap: wrap; align-items: center; }
    .rail .brand { padding: 4px 8px; } .rail .spacer, .userbar { display: none; }
    .nav { width: auto; }
    .main { padding: 22px 18px 50px; }
  }
  @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }

  /* ---------- 答题双栏布局 ---------- */
  .quiz-layout { display: grid; grid-template-columns: 1fr 200px; gap: 20px; align-items: start; max-width: 900px; }
  .quiz-panel { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 20px; position: sticky; top: 24px; }
  .quiz-panel h4 { font-size: 12px; font-weight: 600; color: var(--muted); letter-spacing: .3px; margin: 0 0 12px; }
  .omr-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
  .omr-cell {
    aspect-ratio: 1; border-radius: 6px; border: 1.5px solid var(--line);
    display: grid; place-items: center; font-family: var(--mono); font-size: 11px;
    font-weight: 700; color: var(--muted); cursor: pointer; transition: all .12s;
  }
  .omr-cell:hover { border-color: var(--accent); color: var(--accent); }
  .omr-cell.cur { border-color: var(--accent); background: var(--accent); color: #fff; }
  .omr-cell.hit { border-color: var(--correct); background: var(--correct-soft); color: var(--correct); }
  .omr-cell.mis { border-color: var(--wrong); background: var(--wrong-soft); color: var(--wrong); }
  .omr-cell.skp { border-color: var(--muted); background: var(--paper); color: var(--muted); opacity: .5; }
  .omr-legend { display: flex; flex-direction: column; gap: 5px; margin-top: 12px; font-size: 11px; color: var(--muted); }
  .omr-legend span { display: flex; align-items: center; gap: 5px; }
  .omr-dot { width: 10px; height: 10px; border-radius: 3px; flex: none; }
  .qtimer { font-family: var(--mono); font-size: 12px; color: var(--muted); padding: 3px 8px;
    border-radius: 999px; background: var(--paper); border: 1px solid var(--line); }
  .qtimer.slow { color: var(--wrong); border-color: var(--wrong-soft); background: var(--wrong-soft); }
  .auto-next { height: 3px; background: var(--line); border-radius: 99px; overflow: hidden; margin-top: 10px; }
  .auto-next i { display: block; height: 100%; background: var(--accent); border-radius: 99px; width: 0; }
  .result-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin: 20px 0; }
  .result-cell { background: var(--paper); border-radius: 10px; padding: 14px; text-align: center; }
  .result-cell .rv { font-family: var(--mono); font-size: 22px; font-weight: 700; }
  .result-cell .rk { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .review-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--line); }
  .review-item:last-child { border-bottom: none; }
  .review-badge { flex: none; width: 22px; height: 22px; border-radius: 50%; display: grid; place-items: center; font-size: 11px; font-weight: 700; }
  .review-badge.ok { background: var(--correct-soft); color: var(--correct); }
  .review-badge.no { background: var(--wrong-soft); color: var(--wrong); }
  .review-badge.sk { background: var(--paper); color: var(--muted); }
  @media (max-width: 760px) {
    .quiz-layout { grid-template-columns: 1fr; }
    .quiz-panel { position: static; }
    .omr-grid { grid-template-columns: repeat(8, 1fr); }
  }
  .del-bank { opacity: 0; transition: opacity .15s; }
  .bank:hover .del-bank { opacity: 1; }

  /* ---------- 系统设置 ---------- */
  .settings-layout { display: grid; grid-template-columns: 200px 1fr; gap: 24px; align-items: start; }
  .settings-nav { background: var(--card); border: 1px solid var(--line); border-radius: 14px; overflow: hidden; }
  .settings-nav-item { display: flex; align-items: center; gap: 10px; padding: 11px 16px;
    font-size: 14px; font-weight: 500; color: var(--muted); cursor: pointer; border: none;
    background: none; width: 100%; text-align: left; border-bottom: 1px solid var(--line); }
  .settings-nav-item:last-child { border-bottom: none; }
  .settings-nav-item:hover { background: var(--paper); color: var(--ink); }
  .settings-nav-item.on { background: var(--accent-soft); color: var(--accent); font-weight: 600; }
  .settings-nav-item .sic { font-size: 16px; width: 20px; text-align: center; }
  .settings-content { min-height: 400px; }
  .section-card { background: var(--card); border: 1px solid var(--line); border-radius: 14px;
    padding: 20px 24px; margin-bottom: 16px; }
  .section-card h3 { font-size: 14px; font-weight: 600; margin: 0 0 16px; color: var(--ink); }

  /* ---------- 模型商卡片 ---------- */
  .provider-card { background: var(--card); border: 1.5px solid var(--line); border-radius: 12px;
    padding: 16px 18px; margin-bottom: 10px; transition: border-color .15s; }
  .provider-card.active-provider { border-color: var(--accent); background: var(--accent-soft); }
  .provider-card.has-key { border-color: var(--correct); }
  .provider-header { display: flex; align-items: center; gap: 12px; margin-bottom: 0; }
  .provider-logo { width: 36px; height: 36px; border-radius: 9px; background: var(--paper);
    display: grid; place-items: center; font-size: 18px; flex: none; border: 1px solid var(--line); }
  .provider-info { flex: 1; min-width: 0; }
  .provider-name { font-size: 14px; font-weight: 600; color: var(--ink); }
  .provider-status { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .provider-actions { display: flex; gap: 6px; flex: none; }
  .provider-body { margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--line);
    display: none; flex-direction: column; gap: 10px; }
  .provider-body.open { display: flex; }
  .tag-verified { display: inline-flex; align-items: center; gap: 4px; font-size: 11px;
    padding: 2px 8px; border-radius: 99px; background: var(--correct-soft); color: var(--correct);
    border: 1px solid transparent; font-weight: 500; }
  .tag-unset { display: inline-flex; align-items: center; gap: 4px; font-size: 11px;
    padding: 2px 8px; border-radius: 99px; background: var(--paper); color: var(--muted);
    border: 1px solid var(--line); }

  /* ---------- 用户管理表格 ---------- */
  .admin-table { width: 100%; border-collapse: collapse; }
  .admin-table th { padding: 10px 14px; text-align: left; font-size: 12px; font-weight: 600;
    color: var(--muted); background: var(--paper); border-bottom: 1px solid var(--line); }
  .admin-table td { padding: 11px 14px; font-size: 13px; border-bottom: 1px solid var(--line); vertical-align: middle; }
  .admin-table tr:last-child td { border-bottom: none; }
  .admin-table tr:hover td { background: #FAFBFC; }

  /* ---------- 批量操作 ---------- */
  .bulk-bar {
    position: sticky; bottom: 20px; left: 0; right: 0;
    background: var(--ink); color: #fff;
    border-radius: 12px; padding: 12px 18px;
    display: flex; align-items: center; gap: 12px;
    box-shadow: 0 8px 32px rgba(0,0,0,.25);
    margin-top: 16px;
    transform: translateY(20px); opacity: 0;
    transition: opacity .2s, transform .2s;
    pointer-events: none;
  }
  .bulk-bar.show { opacity: 1; transform: translateY(0); pointer-events: all; }
  .bulk-bar .cnt { font-size: 14px; font-weight: 600; flex: 1; }
  .bulk-bar .cnt span { color: #A5B4FC; }
  .bulk-btn { padding: 7px 14px; border-radius: 8px; font-size: 13px; font-weight: 500;
    border: 1px solid rgba(255,255,255,.2); background: rgba(255,255,255,.1);
    color: #fff; cursor: pointer; font-family: inherit; }
  .bulk-btn:hover { background: rgba(255,255,255,.18); }
  .bulk-btn.danger { border-color: rgba(229,72,77,.5); background: rgba(229,72,77,.2); color: #FCA5A5; }
  .bulk-btn.danger:hover { background: rgba(229,72,77,.35); }
  .q-checkbox { width: 16px; height: 16px; cursor: pointer; accent-color: var(--accent); flex: none; }
</style>
</head>
<body>
<div id="root"></div>
<div id="toast" class="toast"></div>

<script>
const API = (window.QUIZFORGE_API || "") + "/api/v1";
const root = document.getElementById("root");
let S = { token: localStorage.getItem("qf_token"), user: null, view: "banks", bank: null };

/* ---------------- api helper ---------------- */
async function api(path, { method, body, form, noAuth } = {}) {
  method = method || (body !== undefined || form ? "POST" : "GET");
  const headers = {};
  if (S.token && !noAuth) headers.Authorization = "Bearer " + S.token;
  let payload;
  if (form) { payload = form; }
  else if (body !== undefined) { headers["Content-Type"] = "application/json"; payload = JSON.stringify(body); }
  const r = await fetch(API + path, { method, headers, body: payload });
  const data = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(data.detail ? (typeof data.detail === "string" ? data.detail : JSON.stringify(data.detail)) : "请求失败 " + r.status);
  return data;
}
function toast(msg, err) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.className = "toast show" + (err ? " err" : "");
  clearTimeout(t._t); t._t = setTimeout(() => (t.className = "toast"), 2600);
}
const esc = (s) => (s ?? "").toString().replace(/[&<>"]/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;" }[c]));

/* ---------------- 枚举中文映射 ---------------- */
const LABEL = {
  status: { published:"已发布", draft:"草稿", archived:"已归档" },
  qstatus: { approved:"已通过", pending_review:"待审核", rejected:"已拒绝" },
  difficulty: { easy:"基础", medium:"进阶", hard:"综合" },
  mode: { random:"随机", sequential:"顺序", wrong_only:"错题", simulation:"模拟" },
  industry: { it:"IT", medical:"医疗", finance:"金融", education:"教育", construction:"建筑", language:"语言", other:"其他" },
};
const L = (type, val) => LABEL[type]?.[val] || val;

/* ---------------- auth ---------------- */
async function renderAuth() {
  let tab = "login";
  let allowReg = true;
  try {
    const pc = await api("/admin/public-config");
    allowReg = pc.allow_register !== false;
  } catch { /* 拿不到配置就按允许注册处理 */ }
  if (!allowReg) tab = "login";
  const draw = () => {
    root.innerHTML = `
    <div class="auth"><div class="card authcard">
      <div class="brand"><div class="mark">Q</div><div><b>QuizForge</b><span>智能题库系统</span></div></div>
      <div class="tabs">
        <button id="t-login" class="${tab==="login"?"on":""}">登录</button>
        ${allowReg ? `<button id="t-reg" class="${tab==="reg"?"on":""}">注册</button>` : ""}
      </div>
      <form id="af">
        ${tab==="reg" ? `<div class="fld"><label class="f">用户名</label><input class="in" id="username" required minlength="2"></div>` : ""}
        <div class="fld"><label class="f">邮箱</label><input class="in" id="email" type="email" required placeholder="you@example.com"></div>
        <div class="fld"><label class="f">密码</label><input class="in" id="password" type="password" required minlength="6"></div>
        <button class="btn" style="width:100%" type="submit">${tab==="reg"?"创建账号":"登录"}</button>
      </form>
    </div></div>`;
    document.getElementById("t-login").onclick = () => { tab = "login"; draw(); };
    const tReg = document.getElementById("t-reg");
    if (tReg) tReg.onclick = () => { tab = "reg"; draw(); };
    document.getElementById("af").onsubmit = async (e) => {
      e.preventDefault();
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      try {
        if (tab === "reg") {
          await api("/auth/register", { body: { email, username: document.getElementById("username")?.value, password } });
          toast("注册成功，正在登录…");
        }
        const fd = new URLSearchParams({ username: email, password });
        const r = await fetch(API + "/auth/login", { method: "POST", headers: { "Content-Type": "application/x-www-form-urlencoded" }, body: fd });
        const d = await r.json();
        if (!r.ok) throw new Error(d.detail || "登录失败");
        S.token = d.access_token; localStorage.setItem("qf_token", S.token);
        await boot();
      } catch (err) { toast(err.message, true); }
    };
  };
  draw();
}

function go(view) { clearTimer(); clearQTimer(); S.view = view; S.bank = null; route(); }

async function route() {
  try {
    if (S.view === "banks") return await viewBanks();
    if (S.view === "bank") return await viewBankDetail();
    if (S.view === "quiz") return await viewQuiz();
    if (S.view === "wrong") return await viewWrong();
    if (S.view === "stats") return await viewStats();
    if (S.view === "plan") return await viewPlan();
    if (S.view === "plaza") return await viewPlaza();
    if (S.view === "admin" || S.view === "admin_providers" || S.view === "admin_users" || S.view === "admin_site") return await viewAdmin(S.view);
  } catch (e) { toast(e.message, true); }

const STATUS_LABEL = { queued:"排队等待中", processing:"生成中", done:"已完成", failed:"生成失败" };

const STAGE_CONFIG = {
  parsing_file: { text: () => "📄 正在解析文档内容…", useRealCount: false, progressCap: 20 },
  ai_thinking:  { text: (total) => `⚡ AI 正在生成 ${total} 道题目，请稍候…`, useRealCount: false, progressCap: 60 },
  saving:       { text: (total, generated) => `💾 正在保存… 已完成 ${generated} / ${total} 题`, useRealCount: true, progressCap: 99 },
};

async function pollGenerate(task_id) {
  let fakeProgress = 0;
  let currentCap = 30; // 当前伪进度上限，随 stage 更新

  // 伪进度动画：AI 思考阶段让进度条平滑爬升，不卡死
  const fakeTick = setInterval(() => {
    const barEl = document.getElementById("ai_bar");
    if (!barEl) { clearInterval(fakeTick); return; }
    if (fakeProgress < currentCap) {
      fakeProgress += (currentCap - fakeProgress) * 0.06; // 缓动：越接近上限越慢
      barEl.style.width = Math.min(fakeProgress, currentCap).toFixed(1) + "%";
    }
  }, 250);

  const setBar = (pct) => {
    fakeProgress = Math.max(fakeProgress, pct);
    const barEl = document.getElementById("ai_bar");
    if (barEl) barEl.style.width = fakeProgress.toFixed(1) + "%";
  };
  const setMsg = (text) => {
    const msgEl = document.getElementById("ai_msg");
    if (msgEl) msgEl.textContent = text;
  };

  try {
    setMsg("⏳ 提交任务，等待队列…");

    for (let i = 0; i < 80; i++) {
      await new Promise(r => setTimeout(r, 1500));
      let st;
      try { st = await api("/ai/task/" + task_id); } catch { continue; }

      const generated = st.generated || 0;
      const total = st.total || 0;
      const stage = st.stage || (st.status === "processing" ? "ai_thinking" : st.status);

      if (st.status === "queued") {
        setMsg("⏳ 排队等待中，即将开始…");
        continue;
      }

      if (st.status === "processing") {
        const cfg = STAGE_CONFIG[stage];
        if (cfg) {
          currentCap = cfg.progressCap;
          if (cfg.useRealCount && total > 0) {
            // 入库阶段：真实比例映射到 50%~99%
            setBar(50 + (generated / total) * 49);
            setMsg(cfg.text(total, generated));
          } else {
            // AI 思考 / 文件解析阶段：只更新上限，让伪动画自然爬升
            setMsg(cfg.text(total, generated));
          }
        } else {
          // 兜底：没有 stage 字段的旧任务
          setMsg(total > 0
            ? `⚡ 生成中… 已完成 ${generated} / ${total} 题`
            : "⚡ AI 正在生成题目，请稍候…");
        }
        continue;
      }

      if (st.status === "done") {
        clearInterval(fakeTick);
        const barEl = document.getElementById("ai_bar");
        if (barEl) barEl.style.width = "100%";
        setMsg(`✓ 生成完成，共 ${generated} 道题`);
        toast(`✓ 成功生成 ${generated} 道题目`);
        setTimeout(() => viewBankDetail(), 800);
        return;
      }

      if (st.status === "failed") {
        clearInterval(fakeTick);
        throw new Error(st.error_message || "生成失败，请重试");
      }
    }
    // 超时但任务可能仍在后台运行
    clearInterval(fakeTick);
    setMsg("⏱ 生成耗时较长，题目在后台继续生成，请稍后刷新查看");
    toast("生成耗时较长，请稍后刷新题库查看", false);
  } catch(e) {
    clearInterval(fakeTick);
    setMsg("✕ " + e.message);
    throw e;
  }
}

let _generating = false; // 防止重复提交

function _lockGenerate(lock) {
  _generating = lock;
  ["ai_go", "ai_file_go"].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.disabled = lock;
  });
}

async function runAI() {
  if (_generating) return;
  const topic = document.getElementById("ai_topic").value.trim();
  if (!topic) return toast("请填写或选择知识点主题", true);
  _lockGenerate(true);
  const prog = document.getElementById("ai_prog");
  const bar = document.getElementById("ai_bar");
  const msg = document.getElementById("ai_msg");
  prog.style.display = "block";
  bar.style.width = "0%";
  msg.textContent = "⏳ 提交任务…";
  try {
    const { task_id } = await api("/ai/generate", { body: {
      bank_id: S.bank,
      topic,
      difficulty: document.getElementById("ai_diff").value,
      count: Number(document.getElementById("ai_count").value),
      auto_approve: document.getElementById("ai_auto").checked,
    }});
    await pollGenerate(task_id);
  } catch(e) {
    toast(e.message, true);
    const msgEl = document.getElementById("ai_msg");
    if (msgEl) msgEl.textContent = "✕ " + e.message;
  } finally {
    _lockGenerate(false);
  }
}

async function runAIFile() {
  if (_generating) return;
  const f = document.getElementById("ai_file").files[0];
  if (!f) return toast("请先选择文件", true);
  _lockGenerate(true);
  const prog = document.getElementById("ai_prog");
  const bar = document.getElementById("ai_bar");
  const msg = document.getElementById("ai_msg");
  prog.style.display = "block";
  bar.style.width = "0%";
  msg.textContent = "⏳ 上传并解析文件…";
  try {
    const fd = new FormData();
    fd.append("bank_id", S.bank);
    fd.append("difficulty", document.getElementById("ai_file_diff").value);
    fd.append("count", document.getElementById("ai_file_count").value);
    fd.append("auto_approve", document.getElementById("ai_auto").checked);
    fd.append("file", f);
    const { task_id } = await api("/ai/generate-from-file", { form: fd });
    await pollGenerate(task_id);
  } catch(e) {
    toast(e.message, true);
    const msgEl = document.getElementById("ai_msg");
    if (msgEl) msgEl.textContent = "✕ " + e.message;
  } finally {
    _lockGenerate(false);
  }
}

    [["CTF"], "如：Web 漏洞利用、逆向工程基础、密码学题型"],
    [["软考"], "如：计算机网络基础、数据结构与算法、操作系统原理"],
    [["CISP","CISSP"], "如：信息安全管理、风险评估方法、密码技术应用"],
    [["医","执业","护士","药师"], "如：内科疾病诊断、药物作用机制、临床检验解读"],
    [["建筑","一建","二建","注册建筑"], "如：建筑结构力学、施工质量控制、工程造价管理"],
    [["会计","CPA","税务"], "如：资产负债表编制、会计分录、税务处理"],
    [["法律","法考","司法"], "如：合同法基本原则、侵权责任认定、诉讼程序"],
    [["驾","驾照","驾驶"], "如：交通标志识别、行车安全规范、违规处罚规定"],
    [["教师","教资"], "如：教育学基本理论、课堂管理策略、教学设计方法"],
    [["习近平","党政","思政","政治"], "如：新时代中国特色社会主义、五大发展理念、党的建设"],

  for (const [keys, hint] of map) {

let _selectedTopics = new Set();

async function suggestTopics(bankTitle) {
  const btn = document.getElementById("ai_suggest");
  const wrap = document.getElementById("ai_topics_wrap");
  const list = document.getElementById("ai_topics_list");
  btn.disabled = true; btn.textContent = "推荐中…";
  _selectedTopics.clear();
  try {
    const res = await api("/ai/suggest-topics", { body: { bank_title: bankTitle } });
    list.innerHTML = res.topics.map(t => `
      <button class="topic-tag" data-topic="${esc(t)}">${esc(t)}</button>`).join("");
    wrap.style.display = "block";
    list.querySelectorAll(".topic-tag").forEach(tag => {
      tag.onclick = () => {
        const topic = tag.dataset.topic;
        if (_selectedTopics.has(topic)) {
          _selectedTopics.delete(topic);
          tag.classList.remove("on");
        } else {
          _selectedTopics.add(topic);
          tag.classList.add("on");
        }
        // 把所有选中的 tag 写入输入框，用顿号分隔
        const input = document.getElementById("ai_topic");
        input.value = [..._selectedTopics].join("、");
      };
    });
    toast("已推荐 " + res.topics.length + " 个知识点，可多选");
  } catch(e) { toast("推荐失败：" + e.message, true); }
  finally { btn.disabled = false; btn.textContent = "✨ AI 推荐"; }
}

  const modeSel = document.getElementById("qc_mode");
  modeSel.onchange = () => {
    document.getElementById("qc_timewrap").style.display = modeSel.value === "simulation" ? "block" : "none";
  };
  document.getElementById("qc_cancel").onclick = () => document.getElementById("qcfg").remove();
  document.getElementById("qc_go").onclick = () => {
    const mode = modeSel.value;
    const count = document.getElementById("qc_count").value;
    const limit = mode === "simulation" ? Number(document.getElementById("qc_time").value) * 60 : null;
    S._quizMode = mode;
    if (mode === "wrong_only") {
      toast("正在检查错题...");
    }
    startQuiz(S.bank, title, mode, count ? Number(count) : null, limit);
  };
}

async function startQuiz(bankId, title, mode = "random", total = null, limitSec = null) {
  let sess;
  try {
    sess = await api("/quiz/sessions", { body: { bank_id: bankId, mode, total_questions: total, time_limit_seconds: limitSec } });
  } catch (e) {
    const msg = e.message.includes("没有可用题目") && S._quizMode === "wrong_only"
      ? "您在该题库还没有错题，先去练习积累一下吧" : e.message;
    return toast(msg, true);
  }
  const qs = await api(`/quiz/sessions/${sess.id}/questions`);
  Q = {
    session: sess, title, qs, i: 0, locked: false, correct: 0,
    deadline: limitSec ? Date.now() + limitSec * 1000 : null,
    timer: null,
    qtimer: null,
    qStart: Date.now(),
    answers: {},
  };
  S.view = "quiz"; route();
}
function clearTimer() { if (Q && Q.timer) { clearInterval(Q.timer); Q.timer = null; } }
function startQTimer() {
  clearQTimer();
  Q.qStart = Date.now();
  Q.qtimer = setInterval(() => {
    const el = document.getElementById("qtimer");
    if (!el) { clearQTimer(); return; }
    const sec = Math.round((Date.now() - Q.qStart) / 1000);
    el.textContent = sec + "s";
    el.className = "qtimer" + (sec > 30 ? " slow" : "");
  }, 1000);
}
function clearQTimer() {
  if (Q && Q.qtimer) { clearInterval(Q.qtimer); Q.qtimer = null; }
}
async function viewQuiz() {
  if (!Q) return go("banks");
  if (Q.i >= Q.qs.length) return quizSummary();
  const q = Q.qs[Q.i];
  Q.qStart = Date.now();

  const omrCells = Q.qs.map((_, idx) => {
    const a = Q.answers[Q.qs[idx].id];
    let cls = "omr-cell";
    if (idx === Q.i) cls += " cur";
    else if (a?.skipped) cls += " skp";
    else if (a?.is_correct === true) cls += " hit";
    else if (a?.is_correct === false) cls += " mis";
    return `<div class="${cls}" data-idx="${idx}">${String(idx+1).padStart(2,"0")}</div>`;
  }).join("");

  const totalDone = Object.keys(Q.answers).length;
  const isLast = Q.i === Q.qs.length - 1;

  shell("答题 · " + esc(Q.title), L("mode", Q.session.mode), `
    <div class="quiz-layout">
      <div class="card" style="max-width:640px">
        <div class="qmeta">
          <span class="n">第 ${String(Q.i+1).padStart(2,"0")} / ${String(Q.qs.length).padStart(2,"0")} 题</span>
          <span style="display:flex;gap:8px;align-items:center">
            <span class="qtimer" id="qtimer">0s</span>
            ${Q.deadline ? `<span class="pill" id="timer">--:--</span>` : ""}
            <span class="pill">${L("difficulty", q.difficulty)}</span>
          </span>
        </div>
        <div class="progress"><i style="width:${((Q.i+1)/Q.qs.length)*100}%"></i></div>
        <p class="stem">${esc(q.content)}</p>
        <div id="opts">
          ${["A","B","C","D"].map(L2 => `
            <div class="opt" data-l="${L2}">
              <div class="bubble">${L2}</div>
              <div class="txt">${esc(q["option_"+L2.toLowerCase()])}</div>
            </div>`).join("")}
        </div>
        <div id="after"></div>
        <div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--line);display:flex;align-items:center;justify-content:space-between">
          <button class="btn ghost sm" id="btn_skip">${isLast ? "直接交卷" : "跳过此题"}</button>
          <button class="btn ghost sm" id="btn_quit" style="color:var(--wrong);border-color:var(--wrong)">放弃答题</button>
        </div>
      </div>
      <div class="quiz-panel">
        <h4>答题卡</h4>
        <div class="omr-grid" id="omr">${omrCells}</div>
        <div class="omr-legend">
          <span><span class="omr-dot" style="background:var(--correct-soft);border:1.5px solid var(--correct)"></span>答对</span>
          <span><span class="omr-dot" style="background:var(--wrong-soft);border:1.5px solid var(--wrong)"></span>答错</span>
          <span><span class="omr-dot" style="background:var(--paper);border:1.5px solid var(--muted)"></span>跳过</span>
          <span><span class="omr-dot" style="border:1.5px solid var(--line)"></span>未答</span>
        </div>
        <div style="margin-top:14px;padding-top:12px;border-top:1px solid var(--line)">
          <div style="font-size:12px;color:var(--muted);margin-bottom:4px">已完成</div>
          <div style="font-family:var(--mono);font-size:18px;font-weight:700">${totalDone}<span style="font-size:12px;color:var(--muted);font-weight:400"> / ${Q.qs.length}</span></div>
        </div>
      </div>
    </div>`);

  document.getElementById("omr").querySelectorAll(".omr-cell").forEach(cell => {
    cell.onclick = () => { clearQTimer(); Q.i = Number(cell.dataset.idx); Q.locked = false; route(); };
  });

  let pick = null;
  root.querySelectorAll(".opt").forEach(o => o.onclick = () => {
    if (Q.locked) return;
    pick = o.dataset.l;
    root.querySelectorAll(".opt").forEach(x => x.classList.toggle("pick", x === o));
    submitAnswer(q, pick);
  });

  document.getElementById("btn_skip").onclick = () => {
    clearQTimer();
    if (isLast) { Q.i = Q.qs.length; Q.locked = false; route(); }
    else {
      Q.answers[q.id] = Q.answers[q.id] || { skipped: true, answer: null, is_correct: null };
      Q.i++; Q.locked = false; route();
    }
  };

  document.getElementById("btn_quit").onclick = () => {
    if (confirm("确定放弃本次答题？")) { clearTimer(); clearQTimer(); Q = null; go("banks"); }
  };

  clearTimer();
  if (Q.deadline) {
    const tick = () => {
      const rem = Math.max(0, Math.round((Q.deadline - Date.now()) / 1000));
      const el = document.getElementById("timer");
      if (el) {
        el.textContent = `⏱ ${String(Math.floor(rem/60)).padStart(2,"0")}:${String(rem%60).padStart(2,"0")}`;
        el.style.color = rem <= 30 ? "var(--wrong)" : "";
      }
      if (rem <= 0) { clearTimer(); clearQTimer(); toast("时间到，自动交卷"); Q.i = Q.qs.length; route(); }
    };
    tick(); Q.timer = setInterval(tick, 1000);
  }

  startQTimer();

  const onOptKey = (e) => {
    if (Q?.locked) return;
    const key = e.key.toUpperCase();
    if (!["A","B","C","D"].includes(key)) return;
    const opt = root.querySelector(`.opt[data-l="${key}"]`);
    if (opt) opt.click();
    document.removeEventListener("keydown", onOptKey);
  };
  document.addEventListener("keydown", onOptKey);
}
async function submitAnswer(q, pick) {
  if (Q.locked) return;
  Q.locked = true;
  clearQTimer();
  const timeSpent = Math.round((Date.now() - Q.qStart) / 1000);

  let res;
  try {
    res = await api(`/quiz/sessions/${Q.session.id}/answer`, {
      body: { question_id: q.id, user_answer: pick, time_spent_seconds: timeSpent }
    });
  } catch(e) {
    toast(e.message, true); Q.locked = false; startQTimer(); return;
  }

  if (res.is_correct) Q.correct++;
  Q.answers[q.id] = {
    answer: pick, correct_answer: res.correct_answer,
    is_correct: res.is_correct, time_spent: timeSpent,
    content: q.content, skipped: false,
  };

  root.querySelectorAll(".opt").forEach(o => {
    o.classList.add("locked"); o.classList.remove("pick");
    if (o.dataset.l === res.correct_answer) o.classList.add("correct");
    else if (o.dataset.l === pick) o.classList.add("bad");
  });

  const isLast = Q.i === Q.qs.length - 1;
  document.getElementById("after").innerHTML = `
    <div class="explain ${res.is_correct?"r":"w"}" style="margin-top:14px">
      <b>${res.is_correct ? "✓ 回答正确" : "✕ 回答错误"}</b> · 正确答案 ${res.correct_answer}
      ${q.explanation ? `<div style="margin-top:6px;font-size:13px">${esc(q.explanation)}</div>` : ""}
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-top:12px">
      <div style="flex:1;margin-right:12px">
        <div style="font-size:11px;color:var(--muted);margin-bottom:4px">1.5s 后自动跳转</div>
        <div class="auto-next"><i id="auto_bar"></i></div>
      </div>
      <button class="btn sm" id="next_btn">${isLast ? "查看成绩" : "下一题 →"}</button>
    </div>`;

  const cell = document.querySelector(`.omr-cell[data-idx="${Q.i}"]`);
  if (cell) cell.className = "omr-cell " + (res.is_correct ? "hit" : "mis");

  const bar = document.getElementById("auto_bar");
  if (bar) {
    bar.style.transition = "width 1.5s linear";
    requestAnimationFrame(() => { bar.style.width = "100%"; });
  }

  const autoT = setTimeout(() => { Q.i++; Q.locked = false; route(); }, 1500);

  const nextBtn = document.getElementById("next_btn");
  if (nextBtn) nextBtn.onclick = () => { clearTimeout(autoT); Q.i++; Q.locked = false; route(); };

  const onKey = (e) => {
    if (e.key === " " || e.key === "Enter") {
      e.preventDefault();
      clearTimeout(autoT);
      document.removeEventListener("keydown", onKey);
      Q.i++; Q.locked = false; route();
    }
  };
  document.addEventListener("keydown", onKey);
}
async function quizSummary() {
  clearTimer(); clearQTimer();
  const fin = await api(`/quiz/sessions/${Q.session.id}/finish`, { method: "POST" });
  const acc = fin.answered_count === 0 ? 0 : Math.round((fin.correct_count / (fin.total_questions || 1)) * 100);
  const wrongCount = fin.answered_count - fin.correct_count;
  const skipped = fin.total_questions - fin.answered_count;
  const timings = Object.values(Q.answers).filter(a => !a.skipped && a.time_spent);
  const avgTime = timings.length ? Math.round(timings.reduce((s,a) => s + a.time_spent, 0) / timings.length) : 0;

  const reviewRows = Q.qs.map((q, idx) => {
    const a = Q.answers[q.id];
    if (!a || a.skipped) return `
      <div class="review-item">
        <div class="review-badge sk">—</div>
        <div style="flex:1">
          <div style="font-size:13px;color:var(--muted)">${String(idx+1).padStart(2,"0")}. ${esc(q.content.substring(0,50))}${q.content.length>50?"…":""}</div>
          <div style="font-size:12px;color:var(--muted);margin-top:2px">已跳过</div>
        </div>
      </div>`;
    return `
      <div class="review-item">
        <div class="review-badge ${a.is_correct?"ok":"no"}">${a.is_correct?"✓":"✕"}</div>
        <div style="flex:1">
          <div style="font-size:13px">${String(idx+1).padStart(2,"0")}. ${esc(q.content.substring(0,50))}${q.content.length>50?"…":""}</div>
          <div style="font-size:12px;color:var(--muted);margin-top:3px">
            我选：<b style="color:${a.is_correct?"var(--correct)":"var(--wrong)"}">${a.answer}</b>
            ${!a.is_correct?` · 正确：<b style="color:var(--correct)">${a.correct_answer}</b>`:""}
            · 用时 ${a.time_spent}s
          </div>
        </div>
      </div>`;
  }).join("");

  const hasWrong = Object.values(Q.answers).some(a => a.is_correct === false);
  const savedBank = S.bank; const savedTitle = Q.title; const savedMode = Q.session.mode;

  shell("成绩单", "本次成绩", `
    <div style="max-width:700px">
      <div style="text-align:center;padding:28px 20px 16px">
        <div style="font-size:12px;color:var(--muted);letter-spacing:1px;margin-bottom:6px">正确率</div>
        <div style="font-family:var(--mono);font-size:72px;font-weight:800;letter-spacing:-3px;line-height:1;color:${acc>=60?"var(--correct)":"var(--wrong)"}">${acc}<span style="font-size:28px">%</span></div>
        <div style="font-size:14px;color:var(--muted);margin-top:8px">${esc(savedTitle)}</div>
      </div>
      <div class="result-grid">
        <div class="result-cell"><div class="rv" style="color:var(--correct)">${fin.correct_count}</div><div class="rk">答对</div></div>
        <div class="result-cell"><div class="rv" style="color:var(--wrong)">${wrongCount}</div><div class="rk">答错</div></div>
        <div class="result-cell"><div class="rv" style="color:var(--muted)">${skipped}</div><div class="rk">跳过</div></div>
        <div class="result-cell"><div class="rv">${fin.answered_count} / ${fin.total_questions}</div><div class="rk">作答 / 总题</div></div>
        <div class="result-cell"><div class="rv">${avgTime > 0 ? avgTime + "s" : "—"}</div><div class="rk">平均用时/题</div></div>
        <div class="result-cell"><div class="rv" style="color:${acc>=90?"var(--correct)":acc>=60?"var(--ink)":"var(--wrong)"}">${acc>=90?"优秀":acc>=75?"良好":acc>=60?"及格":"待加强"}</div><div class="rk">评级</div></div>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:24px">
        <button class="btn" id="btn_back">返回题库</button>
        ${hasWrong ? `<button class="btn ghost" id="btn_rewrong">复习本次错题</button>` : ""}
        <button class="btn ghost" id="btn_retry">再来一次</button>
        <button class="btn ghost" id="btn_towrong">错题本</button>
      </div>
      <div style="font-weight:600;font-size:15px;margin-bottom:12px">答题明细</div>
      <div class="card" style="padding:4px 16px">${reviewRows}</div>
    </div>`);

  Q = null;
  document.getElementById("btn_back").onclick = () => go("banks");
  document.getElementById("btn_towrong").onclick = () => go("wrong");
  document.getElementById("btn_retry").onclick = () => startQuiz(savedBank, savedTitle, savedMode);
  const rewrong = document.getElementById("btn_rewrong");
  if (rewrong) rewrong.onclick = () => startQuiz(savedBank, savedTitle, "wrong_only");
}

/* ---------------- 错题本 ---------------- */
async function viewWrong(page = 1, bankId = "") {
  const params = `/wrong?page=${page}&size=10${bankId ? "&bank_id="+bankId : ""}`;
  const { items, total } = await api(params);
  const totalPages = Math.ceil(total / 10);

  // 获取题库列表用于筛选下拉
  let bankOpts = "<option value=''>全部题库</option>";
  try {
    const { items: banks } = await api("/banks?size=50");
    bankOpts += banks.map(b => `<option value="${b.id}" ${b.id===bankId?"selected":""}>${esc(b.title)}</option>`).join("");
  } catch {}

  const rows = items.length ? items.map(w => {
    const q = w.question;
    const optHtml = ["A","B","C","D"].map(L => `
      <div style="
        display:flex;align-items:flex-start;gap:8px;
        padding:7px 10px;margin-bottom:5px;border-radius:8px;font-size:13px;
        background:${q.correct_answer===L?"var(--correct-soft)":"var(--paper)"};
        border:1px solid ${q.correct_answer===L?"var(--correct)":"var(--line)"}">
        <span style="
          flex:none;width:20px;height:20px;border-radius:50%;
          display:grid;place-items:center;font-size:11px;font-weight:700;
          background:${q.correct_answer===L?"var(--correct)":"var(--line)"};
          color:${q.correct_answer===L?"#fff":"var(--muted)"}">${L}</span>
        <span style="flex:1;color:${q.correct_answer===L?"var(--correct)":"var(--ink)"}">
          ${esc(q["option_"+L.toLowerCase()]||"")}
          ${q.correct_answer===L?`<span style="font-size:11px;margin-left:4px;opacity:.7">✓ 正确答案</span>`:""}
        </span>
      </div>`).join("");

    return `
      <div class="card" style="margin-bottom:10px" data-wid="${w.question_id}">
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:8px">
          <span class="pill ${w.is_mastered?"ok":"warn"}">${w.is_mastered?"已掌握":"待复习"}</span>
          <span class="pill">错 ${w.wrong_count} 次</span>
          <span class="pill">正确答案 ${q.correct_answer}</span>
          <button class="btn ghost sm wrong-expand" data-wid="${w.question_id}"
            style="margin-left:auto;font-size:12px">展开选项</button>
        </div>
        <div style="font-weight:500;margin-bottom:8px">${esc(q.content)}</div>
        <div id="wopts_${w.question_id}" style="display:none;margin-bottom:8px">
          ${optHtml}
        </div>
        ${q.explanation ? `
          <div class="explain" style="margin-bottom:10px;font-size:13px">
            ${esc(q.explanation)}
          </div>` : ""}
        <div style="display:flex;gap:8px;margin-top:6px">
          ${w.is_mastered ? "" : `
            <button class="btn ghost sm" data-q="${w.question_id}" data-action="master">
              标记已掌握
            </button>`}
          <button class="btn ghost sm" data-q="${w.question_id}" data-action="remove"
            style="color:var(--wrong);border-color:var(--wrong)">从错题本移除</button>
        </div>
      </div>`;
  }).join("") : `<div class="empty"><div class="big">✓</div>错题本是空的，继续保持</div>`;

  const pager = totalPages > 1 ? `
    <div style="display:flex;align-items:center;justify-content:center;gap:10px;margin-top:16px">
      <button class="btn ghost sm" id="wp_prev" ${page<=1?"disabled":""}>← 上一页</button>
      <span style="font-size:13px;color:var(--muted)">${page} / ${totalPages} 页 · 共 ${total} 条</span>
      <button class="btn ghost sm" id="wp_next" ${page>=totalPages?"disabled":""}>下一页 →</button>
    </div>` : "";

  shell("错题本", `${total} ITEMS`,
    `<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
       <select class="in" id="w_bank" style="max-width:220px">${bankOpts}</select>
       <span style="font-size:13px;color:var(--muted)">按题库筛选</span>
     </div>
     ${rows}${pager}`);

  document.getElementById("w_bank").onchange = (e) => viewWrong(1, e.target.value);

  // 展开/收起选项
  root.querySelectorAll(".wrong-expand").forEach(btn => {
    btn.onclick = (e) => {
      e.stopPropagation();
      const opts = document.getElementById("wopts_" + btn.dataset.wid);
      if (!opts) return;
      const open = opts.style.display === "none";
      opts.style.display = open ? "block" : "none";
      btn.textContent = open ? "收起选项" : "展开选项";
    };
  });

  root.querySelectorAll("[data-q]").forEach(b => b.onclick = async () => {
    try {
      if (b.dataset.action === "remove") {
        if (!confirm("确定从错题本移除？移除后将不再出现在错题练习中。")) return;
        await api(`/wrong/${b.dataset.q}`, { method: "DELETE" });
        toast("已从错题本移除");
      } else {
        await api(`/wrong/${b.dataset.q}/master`, { method: "POST" });
        toast("已标记已掌握");
      }
      viewWrong(page, bankId);
    } catch(e) { toast(e.message, true); }
  });
  if (document.getElementById("wp_prev"))
    document.getElementById("wp_prev").onclick = () => viewWrong(page - 1, bankId);
  if (document.getElementById("wp_next"))
    document.getElementById("wp_next").onclick = () => viewWrong(page + 1, bankId);
}

    bankRows = details.filter(Boolean).filter(d => d.my_answered > 0).map(d => `

  shell("学习统计", "OVERVIEW", `

      <div class="card stat"><div class="v">${o.sessions}</div><div class="k">答题会话</div></div>
      <div class="card stat"><div class="v">${o.total_answers}</div><div class="k">累计作答</div></div>

            <th style="padding:8px 12px;text-align:left;font-size:12px;color:var(--muted);font-weight:600">模式</th>
            <th style="padding:8px 12px;text-align:left;font-size:12px;color:var(--muted);font-weight:600">得分</th>

/* ---------------- 题库广场 ---------------- */
async function viewPlaza() {
  let page = 1, sort = "hot", industry = "", search = "";

  const load = async () => {
    const params = new URLSearchParams({ page, size: 18, sort });
    if (industry) params.set("industry", industry);
    if (search) params.set("search", search);
    const { items, total } = await api("/banks/public?" + params, { noAuth: true });
    return { items, total };
  };

  const render = async () => {
    const { items, total } = await load();
    const totalPages = Math.ceil(total / 18);

    const INDUSTRY_COLORS = {
      it:"#E9ECFF,#2F4BFF", medical:"#E4F4ED,#1E9E6A", finance:"#FFF3E0,#B26A00",
      education:"#E8F5E9,#2E7D32", construction:"#FBE9EA,#C62828",
      language:"#F3E5F5,#6A1B9A", other:"#F4F5F7,#6B7280",
    };

    const cards = items.length ? items.map(b => {
      const [bg, color] = (INDUSTRY_COLORS[b.industry] || INDUSTRY_COLORS.other).split(",");
      return `
        <div class="card bank plaza-card" data-id="${b.id}" style="cursor:pointer">
          <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px">
            ${b.industry ? `<span class="pill" style="background:${bg};color:${color};border:none">${L("industry",b.industry)}</span>` : `<span></span>`}
            <span style="font-size:12px;color:var(--muted);font-family:var(--mono)">${b.question_count} 题</span>
          </div>
          <h3 style="margin:0 0 6px;font-size:15px;font-weight:600;line-height:1.4">${esc(b.title)}</h3>
          <div style="font-size:13px;color:var(--muted);min-height:18px;margin-bottom:14px">
            ${esc(b.description) || "<span style='opacity:.4'>暂无描述</span>"}
          </div>
          <div style="border-top:1px solid var(--line);padding-top:10px;display:flex;align-items:center;justify-content:space-between">
            <span class="bank-count-big" style="font-size:22px">${b.question_count}<small> 道题</small></span>
            <button class="btn sm plaza-start" data-id="${b.id}" data-title="${esc(b.title)}"
              style="font-size:12px" onclick="event.stopPropagation()">开始练习</button>
          </div>
        </div>`;
    }).join("") : `<div class="empty" style="grid-column:1/-1"><div class="big">◈</div>暂无符合条件的公开题库</div>`;

    const inds = [["","全部"],["it","IT"],["medical","医疗"],["finance","金融"],
                  ["education","教育"],["construction","建筑"],["language","语言"],["other","其他"]];

    const pager = totalPages > 1 ? `
      <div style="display:flex;align-items:center;justify-content:center;gap:10px;margin-top:20px">
        <button class="btn ghost sm" id="plaza_prev" ${page<=1?"disabled":""}>← 上一页</button>
        <span style="font-size:13px;color:var(--muted)">${page} / ${totalPages} 页 · 共 ${total} 个题库</span>
        <button class="btn ghost sm" id="plaza_next" ${page>=totalPages?"disabled":""}>下一页 →</button>
      </div>` : "";

    shell("题库广场", `${total} 个公开题库`,
      `<div style="display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap">
         <input class="in" id="plaza_search" value="${esc(search)}" placeholder="搜索题库名称…"
           style="max-width:260px;flex:1">
         <div style="display:flex;gap:6px;flex:none">
           <button class="btn ${sort==="hot"?"":"ghost"} sm" id="sort_hot">🔥 热度</button>
           <button class="btn ${sort==="new"?"":"ghost"} sm" id="sort_new">🆕 最新</button>
         </div>
       </div>
       <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px">
         ${inds.map(([v,l])=>`<button class="btn ${industry===v?"":"ghost"} sm plaza-ind" data-ind="${v}">${l}</button>`).join("")}
       </div>
       <div class="grid cols">${cards}</div>
       ${pager}`);

    let searchTimer;
    document.getElementById("plaza_search").oninput = (e) => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => { search = e.target.value.trim(); page = 1; render(); }, 400);
    };
    document.getElementById("sort_hot").onclick = () => { sort = "hot"; page = 1; render(); };
    document.getElementById("sort_new").onclick = () => { sort = "new"; page = 1; render(); };
    root.querySelectorAll(".plaza-ind").forEach(b => {
      b.onclick = () => { industry = b.dataset.ind; page = 1; render(); };
    });

    root.querySelectorAll(".plaza-card").forEach(c => {
      c.onclick = () => {
        if (!S.token) return toast("请先登录后再查看题库详情", true);
        S.bank = c.dataset.id; S.view = "bank"; route();
      };
    });

    root.querySelectorAll(".plaza-start").forEach(btn => {
      btn.onclick = async (e) => {
        e.stopPropagation();
        if (!S.token) return toast("请先登录后再开始练习", true);
        S.bank = btn.dataset.id;
        S.view = "bank";
        await route();
        openQuizConfig(btn.dataset.title);
      };
    });

    document.getElementById("plaza_prev")?.onclick = () => { page--; render(); };
    document.getElementById("plaza_next")?.onclick = () => { page++; render(); };
  };

  await render();
}

/* ---------------- 学习计划 ---------------- */
async function viewPlan() {
  const { items: plans } = await api("/study-plans?size=50").catch(() => ({ items: [] }));
  const { items: banks } = await api("/banks?size=100").catch(() => ({ items: [] }));
  const bankOpts = banks.map(b => `<option value="${b.id}">${esc(b.title)}</option>`).join("");

  const planCards = plans.length ? plans.map(p => {
    const bank = banks.find(b => b.id === p.bank_id);
    const daysLeft = Math.max(0, Math.ceil((new Date(p.target_date) - new Date()) / 86400000));
    return `
      <div class="card" style="margin-bottom:10px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
          <span style="font-weight:500;font-size:14px">${esc(bank?.title || "未知题库")}</span>
          <span class="pill ${p.is_active?"ok":""}">
            ${p.is_active ? (daysLeft > 0 ? `${daysLeft} 天后到期` : "已到期") : "已停用"}
          </span>
        </div>
        <div style="font-size:13px;color:var(--muted);margin-bottom:10px">
          目标日期：${p.target_date} · 每日新题：${p.daily_new_questions} 道 · 每日复习：${p.daily_review_questions} 道
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn ghost sm" data-bank="${p.bank_id}" data-action="go">去练习</button>
          <button class="btn ghost sm" style="color:var(--wrong);border-color:var(--wrong);margin-left:auto"
            data-plan="${p.id}" data-action="del">删除计划</button>
        </div>
      </div>`;
  }).join("") : `<div class="empty"><div class="big">▷</div>还没有学习计划，创建一个开始有计划地学习</div>`;

  shell("学习计划", `${plans.length} 个计划`,
    `<div style="margin-bottom:16px"><button class="btn" id="new_plan">＋ 新建学习计划</button></div>
     ${planCards}`);

  document.getElementById("new_plan").onclick = () => {
    if (document.getElementById("npf")) return;
    document.getElementById("body").insertAdjacentHTML("afterbegin", `
      <div class="card" id="npf" style="margin-bottom:18px">
        <div style="font-weight:600;margin-bottom:12px">新建学习计划</div>
        <div class="row">
          <div style="flex:2"><label class="f">选择题库 *</label>
            <select class="in" id="np_bank"><option value="">请选择…</option>${bankOpts}</select></div>
          <div><label class="f">目标完成日期 *</label>
            <input class="in" id="np_date" type="date" min="${new Date().toISOString().split('T')[0]}"></div>
        </div>
        <div class="row" style="margin-top:10px">
          <div><label class="f">每日新题数</label>
            <input class="in" id="np_new" type="number" value="10" min="1" max="100"></div>
          <div><label class="f">每日复习数</label>
            <input class="in" id="np_rev" type="number" value="5" min="0" max="100"></div>
        </div>
        <div class="row" style="margin-top:12px;justify-content:flex-end"><div style="flex:none">
          <button class="btn sm" id="np_save">创建</button>
          <button class="btn ghost sm" id="np_cancel" style="margin-left:8px">取消</button>
        </div></div>
      </div>`);
    document.getElementById("np_cancel").onclick = () => document.getElementById("npf").remove();
    document.getElementById("np_save").onclick = async () => {
      const bank_id = document.getElementById("np_bank").value;
      const target_date = document.getElementById("np_date").value;
      if (!bank_id) return toast("请选择题库", true);
      if (!target_date) return toast("请选择目标日期", true);
      try {
        await api("/study-plans", { body: {
          bank_id, target_date,
          daily_new_questions: Number(document.getElementById("np_new").value),
          daily_review_questions: Number(document.getElementById("np_rev").value),
        }});
        toast("学习计划已创建");
        document.getElementById("npf").remove();
        viewPlan();
      } catch(e) { toast(e.message, true); }
    };
  };

  root.querySelectorAll("[data-action]").forEach(b => b.onclick = async () => {
    if (b.dataset.action === "go") { S.bank = b.dataset.bank; S.view = "bank"; route(); return; }
    if (b.dataset.action === "del") {
      if (!confirm("确定删除这个学习计划？")) return;
      try { await api("/study-plans/" + b.dataset.plan, { method: "DELETE" }); toast("计划已删除"); viewPlan(); }
      catch(e) { toast(e.message, true); }
    }
  });
}

const PROVIDER_ICONS = {

  kimi:"🌙", baichuan:"🏔", lingyiwanwu:"✨", groq:"⚡", custom:"🔧",
};

async function viewAdmin(subview) {
  if (S.user?.role !== "admin") return toast("无权访问", true);
  if (!subview || subview === "admin") subview = "admin_providers";
  S.view = subview;

  const tabs = [
    { v:"admin_providers", l:"AI 模型管理", ic:"🤖" },
    { v:"admin_users",     l:"用户管理",   ic:"👥" },
    { v:"admin_site",      l:"站点设置",   ic:"🌐" },
  ];

  const tabNav = tabs.map(t => `
    <button class="settings-nav-item ${subview===t.v?"on":""}" data-sub="${t.v}">
      <span class="sic">${t.ic}</span>${t.l}
    </button>`).join("");

  let content = "";

  if (subview === "admin_providers") {
    content = await renderProviders();
  } else if (subview === "admin_users") {
    content = await renderUsers();
  } else if (subview === "admin_site") {
    content = await renderSiteConfig();
  }

  shell("系统设置", "ADMIN",
    `<div class="settings-layout">
       <div class="settings-nav">${tabNav}</div>
       <div class="settings-content" id="settings_content">${content}</div>
     </div>`);

  root.querySelectorAll(".settings-nav-item").forEach(b => {
    b.onclick = () => viewAdmin(b.dataset.sub);
  });

  bindProviderEvents();
  bindUserEvents();
  bindSiteEvents();
}

      ? `<span class="tag-verified">✓ 已配置</span>`

    if (isActive) statusHtml += ` <span class="tag-verified" style="background:var(--accent-soft);color:var(--accent);border-color:var(--accent)">● 使用中</span>`;

    return `
      <div class="provider-card ${isActive?"active-provider":hasKey?"has-key":""}" data-pid="${p.id}">
        <div class="provider-header">
          <div class="provider-logo">${PROVIDER_ICONS[p.id] || "🤖"}</div>

            <div class="provider-status">${statusHtml}</div>
          </div>

          <div><label class="f">API Key</label>
            <div style="display:flex;gap:6px">
              <input class="in pkey" type="password" id="pkey_${p.id}" placeholder="${hasKey?"留空=不修改":"输入 API Key"}" style="flex:1" data-pid="${p.id}">

            </select>

          <div style="display:flex;gap:8px;margin-top:4px">
            <button class="btn sm save-provider-btn" data-pid="${p.id}">保存</button>
            <button class="btn ghost sm verify-btn" data-pid="${p.id}">验证 Key</button>
            ${p.id.startsWith("custom_") ? `<button class="btn ghost sm del-provider-btn" data-pid="${p.id}" style="color:var(--wrong);border-color:var(--wrong);margin-left:auto">删除</button>` : ""}
          </div>

  <div id="custom_provider_form" style="display:none" class="section-card">
    <h3>新增自定义模型商</h3>
    <div class="row">
      <div><label class="f">名称</label><input class="in" id="cp_name" placeholder="我的 API"></div>
      <div><label class="f">Base URL</label><input class="in" id="cp_url" placeholder="https://api.example.com/v1"></div>
    </div>
    <div class="row" style="margin-top:10px">
      <div><label class="f">API Key</label><input class="in" id="cp_key" type="password"></div>
      <div><label class="f">默认模型</label><input class="in" id="cp_model" placeholder="gpt-4o"></div>

    <div style="display:flex;gap:8px;margin-top:12px">

function bindProviderEvents() {
  // 展开/收起
  root.querySelectorAll(".expand-btn").forEach(btn => {
    btn.onclick = () => {
      const body = document.getElementById("pbody_" + btn.dataset.pid);
      if (!body) return;
      const open = body.classList.toggle("open");
      btn.textContent = open ? "收起 ▴" : "配置 ▾";
    };
  });

  // 显示/隐藏 key
  root.querySelectorAll(".pkey-toggle").forEach(btn => {
    btn.onclick = () => {
      const inp = document.getElementById(btn.dataset.target);
      if (!inp) return;
      inp.type = inp.type === "password" ? "text" : "password";
      btn.textContent = inp.type === "password" ? "显示" : "隐藏";
    };
  });

  // 拉取模型列表
  root.querySelectorAll(".fetch-models-btn").forEach(btn => {
    btn.onclick = async () => {
      const pid = btn.dataset.pid;
      btn.disabled = true; btn.textContent = "拉取中…";
      try {
        // 把当前输入框的值直接传给后端，无需提前保存
        const body = {};
        const key = document.getElementById("pkey_" + pid)?.value?.trim();
        const url = document.getElementById("purl_" + pid)?.value?.trim();
        const model = document.getElementById("pmodel_" + pid)?.value?.trim();
        if (key) body.api_key = key;
        if (url) body.base_url = url;
        if (model) body.model = model;
        const { models } = await api(`/admin/providers/${pid}/fetch-models`, {
          method: "POST",
          body: Object.keys(body).length ? body : undefined,
        });
        const sel = document.getElementById("pmodels_" + pid)?.querySelector("select");
        if (sel) {
          sel.innerHTML = `<option value="">— 选择模型 —</option>` + models.map(m => `<option value="${esc(m)}">${esc(m)}</option>`).join("");
          document.getElementById("pmodels_" + pid).style.display = "block";
        }
        toast(`获取到 ${models.length} 个模型`);
      } catch(e) { toast(e.message, true); }
      finally { btn.disabled = false; btn.textContent = "拉取模型列表"; }
    };
  });

  // 模型列表选择 → 填入输入框
  root.querySelectorAll(".pmodel-sel").forEach(sel => {
    sel.onchange = () => {
      if (!sel.value) return;
      const inp = document.getElementById(sel.dataset.target);
      if (inp) inp.value = sel.value;
    };
  });

  // 保存配置
  root.querySelectorAll(".save-provider-btn").forEach(btn => {
    btn.onclick = async () => {
      const pid = btn.dataset.pid;
      btn.disabled = true; btn.textContent = "保存中…";
      const body = {};
      const key = document.getElementById("pkey_" + pid)?.value;
      if (key) body.api_key = key;
      const model = document.getElementById("pmodel_" + pid)?.value;
      if (model) body.model = model;
      const url = document.getElementById("purl_" + pid)?.value;
      if (url) body.base_url = url;
      try {
        await api(`/admin/providers/${pid}`, { method:"PUT", body });
        toast("配置已保存"); viewAdmin("admin_providers");
      } catch(e) { toast(e.message, true); }
      finally { btn.disabled = false; btn.textContent = "保存"; }
    };
  });

  // 设为默认
  root.querySelectorAll(".activate-btn").forEach(btn => {
    btn.onclick = async () => {
      try {
        await api("/admin/site-config", { method:"PUT", body:{ active_provider: btn.dataset.pid } });
        toast("已切换默认模型"); viewAdmin("admin_providers");
      } catch(e) { toast(e.message, true); }
    };
  });

  // 验证 Key
  root.querySelectorAll(".verify-btn").forEach(btn => {
    btn.onclick = async () => {
      const pid = btn.dataset.pid;
      btn.disabled = true; btn.textContent = "验证中…";
      const statusEl = document.getElementById("pverify_" + pid);
      if (statusEl) statusEl.innerHTML = `<span style="color:var(--muted)">验证中…</span>`;
      try {
        // 把当前输入框的值传给后端，无需提前保存
        const body = {};
        const key = document.getElementById("pkey_" + pid)?.value?.trim();
        const url = document.getElementById("purl_" + pid)?.value?.trim();
        const model = document.getElementById("pmodel_" + pid)?.value?.trim();
        if (key) body.api_key = key;
        if (url) body.base_url = url;
        if (model) body.model = model;
        const res = await api(`/admin/providers/${pid}/verify`, {
          method: "POST",
          body: Object.keys(body).length ? body : undefined,
        });
        if (statusEl) {
          statusEl.innerHTML = res.valid
            ? `<span style="color:var(--correct)">✓ ${esc(res.detail)}</span>`
            : `<span style="color:var(--wrong)">✕ ${esc(res.detail)}</span>`;
        }
      } catch(e) {
        if (statusEl) statusEl.innerHTML = `<span style="color:var(--wrong)">✕ ${esc(e.message)}</span>`;
      }
      finally { btn.disabled = false; btn.textContent = "验证 Key"; }
    };
  });

  // 删除自定义
  root.querySelectorAll(".del-provider-btn").forEach(btn => {
    btn.onclick = async () => {
      if (!confirm("确定删除该自定义模型商？")) return;
      try {
        await api(`/admin/providers/${btn.dataset.pid}`, { method:"DELETE" });
        toast("已删除"); viewAdmin("admin_providers");
      } catch(e) { toast(e.message, true); }
    };
  });

  // 添加自定义
  const addBtn = document.getElementById("add_custom_provider");
  const form = document.getElementById("custom_provider_form");
  if (addBtn && form) {
    addBtn.onclick = () => { form.style.display = form.style.display === "none" ? "block" : "none"; };
    const cpCancel = document.getElementById("cp_cancel");
    if (cpCancel) cpCancel.onclick = () => { form.style.display = "none"; };
    const cpSave = document.getElementById("cp_save");
    if (cpSave) cpSave.onclick = async () => {
      const name = document.getElementById("cp_name").value.trim();
      const url = document.getElementById("cp_url").value.trim();
      const key = document.getElementById("cp_key").value.trim();
      const model = document.getElementById("cp_model").value.trim();
      if (!name || !url || !key || !model) return toast("所有字段均为必填", true);
      try {
        await api("/admin/providers/custom", { body:{ name, base_url: url, api_key: key, model } });
        toast("已添加自定义模型商"); viewAdmin("admin_providers");
      } catch(e) { toast(e.message, true); }
    };
  }
}

/* ── 用户管理 ────────────────────────── */
async function renderUsers() {
  const users = await api("/users");
  const rows = users.map(u => `
    <tr>
      <td>
        <div style="display:flex;align-items:center;gap:10px">
          <div style="width:30px;height:30px;border-radius:50%;background:var(--accent-soft);display:grid;place-items:center;font-size:12px;font-weight:700;color:var(--accent);flex:none">
            ${(u.username||"?")[0].toUpperCase()}
          </div>
          <div>
            <div style="font-weight:500">${esc(u.username)}</div>
            <div style="font-size:12px;color:var(--muted)">${esc(u.email)}</div>
          </div>
        </div>
      </td>
      <td>
        <select class="in role-sel" data-uid="${u.id}" style="padding:5px 8px;font-size:12px;width:90px" ${u.id===S.user?.id?"disabled":""}>
          <option value="user"   ${u.role==="user"  ?"selected":""}>用户</option>
          <option value="editor" ${u.role==="editor"?"selected":""}>编辑</option>
          <option value="admin"  ${u.role==="admin" ?"selected":""}>管理员</option>
        </select>
      </td>
      <td><span class="pill ${u.is_active?"ok":"warn"}">${u.is_active?"正常":"已停用"}</span></td>
      <td style="color:var(--muted)">${new Date(u.created_at).toLocaleDateString("zh-CN")}</td>
      <td>
        ${u.id!==S.user?.id ? `
          <button class="btn ghost sm toggle-user" data-uid="${u.id}" data-active="${u.is_active}" style="font-size:12px">
            ${u.is_active?"停用":"启用"}
          </button>` : `<span style="font-size:12px;color:var(--muted)">当前账号</span>`}
      </td>
    </tr>`).join("");
  return `
    <div class="section-card" style="padding:0;overflow:hidden">
      <table class="admin-table">
        <thead><tr>
          <th>用户</th><th>角色</th><th>状态</th><th>注册时间</th><th>操作</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

function bindUserEvents() {
  root.querySelectorAll(".role-sel").forEach(sel => {
    sel.onchange = async () => {
      try {
        await api("/users/" + sel.dataset.uid, { method:"PUT", body:{ role: sel.value } });
        toast("角色已更新");
      } catch(e) { toast(e.message, true); }
    };
  });
  root.querySelectorAll(".toggle-user").forEach(btn => {
    btn.onclick = async () => {
      const active = btn.dataset.active === "true";
      if (!confirm(`确定${active?"停用":"启用"}该用户？`)) return;
      try {
        await api("/users/" + btn.dataset.uid, { method: active ? "DELETE" : "PUT", body: active ? undefined : { is_active: true } });
        toast(active ? "已停用" : "已启用"); viewAdmin("admin_users");
      } catch(e) { toast(e.message, true); }
    };
  });
}

/* ── 站点设置 ────────────────────────── */
async function renderSiteConfig() {
  const cfg = await api("/admin/site-config");
  return `
    <div class="section-card">
      <h3>站点设置</h3>
      <div class="fld"><label class="f">站点名称</label><input class="in" id="site_name" value="${esc(cfg.site_name)}"></div>
      <div class="fld" style="display:flex;align-items:center;gap:10px">
        <input type="checkbox" id="site_reg" ${cfg.allow_register?"checked":""} style="width:16px;height:16px">
        <label for="site_reg" style="font-size:14px;cursor:pointer">允许新用户注册</label>
      </div>
      <button class="btn" id="save_site_btn">保存站点设置</button>
    </div>`;
}

function bindSiteEvents() {
  document.getElementById("save_site_btn")?.addEventListener("click", async () => {
    const btn = document.getElementById("save_site_btn");
    btn.disabled = true; btn.textContent = "保存中…";
    try {
      await api("/admin/site-config", { method:"PUT", body:{
        site_name: document.getElementById("site_name")?.value.trim(),
        allow_register: document.getElementById("site_reg")?.checked,
      }});
      toast("站点设置已保存");
    } catch(e) { toast(e.message, true); }
    finally { btn.disabled = false; btn.textContent = "保存站点设置"; }
  });
}

/* ---------------- boot ---------------- */
async function boot() {
  try {
    S.user = await api("/auth/me");
    S.view = S.view || "banks"; route();
  } catch { localStorage.removeItem("qf_token"); S.token = null; renderAuth(); }
}
if (S.token) boot(); else renderAuth();
</script>
</body>
